name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (web + server)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Build server (tsc)
        run: npm run build:api

      # Sentry source-map upload is gated on SENTRY_AUTH_TOKEN in vite.config.ts;
      # it is absent here, so the build runs without uploading.
      - name: Build web (vite)
        run: npm run build

  e2e:
    name: E2E (accessibility + release smoke)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Install Playwright browser
        timeout-minutes: 8
        run: npx playwright install --with-deps chromium

      # .env.test is gitignored — reconstruct it from repo secrets for the run.
      # Stripe test-card fixtures are public Stripe values, kept inline.
      - name: Write .env.test from secrets
        run: |
          cat > .env.test <<EOF
          TEST_BASE_URL=http://localhost:3000
          TEST_EMAIL=${{ secrets.TEST_EMAIL }}
          TEST_PHONE=${{ secrets.TEST_PHONE }}
          TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}
          STRIPE_TEST_CARD=4242424242424242
          STRIPE_DECLINED_CARD=4000000000000002
          STRIPE_EXPIRY=12/34
          STRIPE_CVC=123
          STRIPE_ZIP=SW1A1AA
          SUPABASE_URL=${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          EOF

      # CI=true (set automatically by GitHub Actions) makes the Playwright
      # webServer start fresh web + API processes instead of reusing one.
      - name: Accessibility checks
        run: npx playwright test e2e/accessibility.spec.ts

      - name: Release smoke checks
        run: npm run test:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
