    <style>
      /* ─── Industrial Luminescence CSS Variables ─── */
      :root {
        --color-void:         #020D18;
        --color-navy:         #051426;
        --color-navy-mid:     #0A2340;
        --color-navy-high:    #0F3060;
        --color-orange:       #FF6B2B;
        --color-orange-glow:  #FF8C55;
        --color-orange-soft:  #ffb59a;
        --color-accent:       #99cbff;
        --color-offwhite:     #F0F4F8;
      }

      *, *::before, *::after { box-sizing: border-box; }

      html { scroll-behavior: smooth; }

      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: var(--color-navy);
        color: var(--color-offwhite);
        font-family: 'Manrope', sans-serif;
      }

      ::selection {
        background: rgba(255, 107, 43, 0.30);
        color: #F0F4F8;
      }

      :focus-visible {
        outline: 2px solid var(--color-orange);
        outline-offset: 3px;
      }

      /* ─── Scrollbar ─── */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* ─── Glass Utilities ─── */
      .glass {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .glass-elevated {
        background: rgba(255, 255, 255, 0.10);
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
      }
      .glass-deep {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      /* ─── Blueprint Grid ─── */
      .blueprint-grid {
        background-image:
          linear-gradient(rgba(153, 203, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(153, 203, 255, 0.035) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* ─── Gradient Text ─── */
      .text-gradient-orange {
        background: linear-gradient(135deg, #FF6B2B 0%, #ffb59a 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .text-gradient-blue {
        background: linear-gradient(135deg, #99cbff 0%, #60A5FA 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ─── Glow Shadows ─── */
      .shadow-orange-glow {
        box-shadow: 0 0 24px rgba(255, 107, 43, 0.35), 0 4px 16px rgba(255, 107, 43, 0.20);
      }
      .shadow-orange-glow-lg {
        box-shadow: 0 0 40px rgba(255, 107, 43, 0.50), 0 8px 24px rgba(255, 107, 43, 0.30);
      }
      .shadow-blue-glow {
        box-shadow: 0 0 20px rgba(153, 203, 255, 0.25), 0 4px 12px rgba(153, 203, 255, 0.15);
      }

      /* ─── Range Input: Orange Track ─── */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.10);
        cursor: pointer;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #FF6B2B;
        box-shadow: 0 0 12px rgba(255, 107, 43, 0.50);
        cursor: pointer;
      }
      input[type="range"]::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #FF6B2B;
        box-shadow: 0 0 12px rgba(255, 107, 43, 0.50);
        cursor: pointer;
        border: none;
      }

      /* ─── Keyframe Animations ─── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes pulseGlow {
        0%,  100% { box-shadow: 0 0 24px rgba(255,107,43,0.35), 0 4px 16px rgba(255,107,43,0.20); }
        50%        { box-shadow: 0 0 48px rgba(255,107,43,0.60), 0 8px 24px rgba(255,107,43,0.40); }
      }
      @keyframes floatUp {
        0%,  100% { transform: translateY(0px);  }
        50%        { transform: translateY(-6px); }
      }
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(20px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes gaugeArc {
        from { stroke-dashoffset: 251.3; }
        to   { stroke-dashoffset: var(--gauge-offset, 0); }
      }
      @keyframes incomingPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,43,0.4); }
        50%       { box-shadow: 0 0 0 8px rgba(255,107,43,0); }
      }
      @keyframes marquee {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }

      /* ─── Utility Animation Classes ─── */
      .animate-fade-up    { animation: fadeUp 0.4s cubic-bezier(0,0,0.2,1) both; }
      .animate-fade-in    { animation: fadeIn 0.5s ease both; }
      .animate-float      { animation: floatUp 4s ease-in-out infinite; }
      .animate-pulse-glow { animation: pulseGlow 2.5s ease-in-out infinite; }
      .animate-marquee    { animation: marquee 30s linear infinite; }

      /* ─── Stagger Delays ─── */
      .stagger-1 { animation-delay:   0ms; }
      .stagger-2 { animation-delay:  80ms; }
      .stagger-3 { animation-delay: 160ms; }
      .stagger-4 { animation-delay: 240ms; }
      .stagger-5 { animation-delay: 320ms; }

      /* ─── Mobile Safe Area ─── */
      .pb-safe { padding-bottom: max(env(safe-area-inset-bottom, 0px), 0px); }

      /* ─── Section Fade Overlays ─── */
      .section-fade-top    { background: linear-gradient(180deg, var(--color-void) 0%, transparent 100%); }
      .section-fade-bottom { background: linear-gradient(0deg, var(--color-void) 0%, transparent 100%); }

      /* ─── Pricing Popular Ring ─── */
      .popular-ring {
        box-shadow: 0 0 0 1px rgba(255,107,43,0.30),
                    0 20px 60px rgba(2,13,24,0.50),
                    0 0 40px rgba(255,107,43,0.08);
      }

      /* ─── Glass Card Ring ─── */
      .glass-ring {
        box-shadow: 0 0 0 1px rgba(255,255,255,0.08),
                    0 8px 32px rgba(2,13,24,0.40);
      }
      .glass-ring-hover:hover {
        box-shadow: 0 0 0 1px rgba(255,107,43,0.15),
                    0 20px 60px rgba(2,13,24,0.50);
      }

      /* ─── Accordion transition ─── */
      .accordion-body {
        overflow: hidden;
        transition: max-height 400ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ─── Comparison table tonal rows ─── */
      .table-row-alt:nth-child(odd) {
        background: rgba(255,255,255,0.02);
      }
    </style>
